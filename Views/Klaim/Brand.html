<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Klaim Brand | KICAO KDS</title>
    <meta content="width=device-width, initial-scale=1" name="viewport">
</head>
<body style="background:#ecf0f5; padding:10px;">
    <div id="app-content">
        <section class="content-header">
            <h1>Klaim Brand <small>Alokasi Subbrand</small></h1>
        </section>
        <section class="content">
            <div class="box box-primary">
                <div class="box-header with-border text-right">
                    <button id="btnOK" class="btn btn-success"><i class="fa fa-floppy-o"></i> OK</button>
                    <button id="btnCancel" class="btn btn-warning"><i class="fa fa-refresh"></i> Cancel</button>
                </div>
                <div class="box-body">
                     <div class="row-form">
                         <div class="col-md-2"><label class="control-label">Umbrand <i class="fa fa-info-circle text-info" data-toggle="tooltip" data-html="true" title="Table: <b>XXSHP_KDS_T_KLAIM_BRAN</b><br>Field: <b>TXT_UMBRAND</b> (Denormalized)"></i></label></div>
                         <div class="col-md-4"><input class="form-control" id="txtUmbrand" disabled></div>
                     </div>
                     <div class="row-form">
                         <div class="col-md-2"><label class="control-label">Brand <i class="fa fa-info-circle text-info" data-toggle="tooltip" data-html="true" title="Table: <b>XXSHP_KDS_T_KLAIM_BRAN</b><br>Field: <b>TXT_BRAND</b> (Denormalized)"></i></label></div>
                         <div class="col-md-4"><input class="form-control" id="txtBrand" disabled></div>
                     </div>
                     <div class="row-form">
                         <div class="col-md-2"><label class="control-label">Total Amount <i class="fa fa-info-circle text-info" data-toggle="tooltip" data-html="true" title="Table: <b>XXSHP_KDS_T_KLAIM_UMB</b><br>Field: <b>DEC_AMOUNT</b>"></i></label></div>
                         <div class="col-md-4"><input class="form-control text-right" id="txtTotalAmount" disabled></div>
                     </div>
                 </div>
            </div>

            <div class="panel with-nav-tabs panel-default">
                <div class="panel-heading">
                    <ul class="nav nav-tabs"><li class="active"><a href="#tabBrand" data-toggle="tab">Brand</a></li></ul>
                </div>
                <div class="panel-body">
                    <table id="dtBrand" class="table table-condensed table-striped table-hover table-bordered">
                        <thead>
                            <tr style="background:#36752d;color:white;">
                                <th>No</th>
                                <th>SubBrand <i class="fa fa-info-circle text-info" data-toggle="tooltip" data-html="true" title="Table: <b>XXSHP_KDS_T_KLAIM_BRAN</b><br>Field: <b>TXT_SUBBRAND</b>"></i></th>
                                <th>All SKU <i class="fa fa-info-circle text-info" data-toggle="tooltip" data-html="true" title="Table: <b>XXSHP_KDS_T_KLAIM_BRAN</b><br>Field: <b>BIT_ALL_SKU</b>"></i></th>
                                <th style="text-align:right;">Amount <i class="fa fa-info-circle text-info" data-toggle="tooltip" data-html="true" title="Table: <b>XXSHP_KDS_T_KLAIM_BRAN</b><br>Field: <b>DEC_AMOUNT</b>"></i></th>
                                <th>SKU <i class="fa fa-info-circle text-info" data-toggle="tooltip" data-html="true" title="Table: <b>XXSHP_KDS_T_KLAIM_SKU</b> (via Allocation)"></i></th>
                                <th>Delete</th>
                            </tr>
                        </thead>
                        <tbody id="dtBrandBody"></tbody>
                    </table>
                    <div class="text-right" style="margin-top:10px;">
                        <button class="btn btn-warning" id="btnAddBrand">Add Row</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="../../Scripts/customs/prototype/klaim-prototype.js"></script>
    <script>
        let basePath, detailIndex, umbIndex, claimData, brandRows = [];

        const MOCK_SUBBRAND = ['MILNA UHT 180ML', 'MILNA UHT 250ML', 'CHILKID GOLD 400G', 'Prenagen Mommy 200ML'];

        document.addEventListener('DOMContentLoaded', async () => {
            basePath = klaimDetectBasePath();
            klaimLoadBlankAssets(basePath);
            await klaimLoadBlankScripts(basePath);

            detailIndex = parseInt(klaimGetQueryParam('intDetailIndex') || '0', 10);
            umbIndex = parseInt(klaimGetQueryParam('intIndex') || '0', 10);
            claimData = klaimGetData() || klaimDefaultClaimData();
            const dtl = klaimEnsureDetail(claimData, detailIndex);
            const umb = dtl.XXSHP_KDS_T_KLAIM_UMB[umbIndex] || {};

            document.getElementById('txtUmbrand').value = umb.TXT_UMBRAND || '';
            document.getElementById('txtBrand').value = umb.TXT_BRAND || '';
            document.getElementById('txtTotalAmount').value = klaimFormatCurrency(umb.DEC_AMOUNT || 0);

            if (umb.XXSHP_KDS_T_KLAIM_BRAN && umb.XXSHP_KDS_T_KLAIM_BRAN.length) {
                brandRows = umb.XXSHP_KDS_T_KLAIM_BRAN.map(b => ({
                    TXT_SUBBRAND: b.TXT_SUBBRAND || '',
                    BIT_ALL_SKU: b.BIT_ALL_SKU === 'Y',
                    DEC_AMOUNT: b.DEC_AMOUNT || 0,
                    XXSHP_KDS_T_KLAIM_SKU: b.XXSHP_KDS_T_KLAIM_SKU || []
                }));
            } else {
                brandRows = [{ TXT_SUBBRAND: MOCK_SUBBRAND[0], BIT_ALL_SKU: false, DEC_AMOUNT: umb.DEC_AMOUNT || 0, XXSHP_KDS_T_KLAIM_SKU: [] }];
            }

            renderTable();
            document.getElementById('btnAddBrand').onclick = addRow;
            document.getElementById('btnOK').onclick = handleOK;
            document.getElementById('btnCancel').onclick = () => window.parent.$('#klaimPopupModal').modal('hide');
            $('[data-toggle="tooltip"]').tooltip({ container: 'body' });
        });

        function renderTable() {
            const tbody = document.getElementById('dtBrandBody');
            tbody.innerHTML = '';
            brandRows.forEach((row, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="text-align:center;">${i + 1}</td>
                    <td>
                        <select class="form-control input-sm" onchange="brandRows[${i}].TXT_SUBBRAND=this.value">
                            ${MOCK_SUBBRAND.map(s => `<option ${row.TXT_SUBBRAND === s ? 'selected' : ''}>${s}</option>`).join('')}
                        </select>
                    </td>
                    <td style="text-align:center;"><input type="checkbox" ${row.BIT_ALL_SKU ? 'checked' : ''} onchange="brandRows[${i}].BIT_ALL_SKU=this.checked"></td>
                    <td><input class="form-control input-sm text-right" value="${klaimFormatCurrency(row.DEC_AMOUNT)}" onchange="brandRows[${i}].DEC_AMOUNT=klaimCleanNumber(this.value); renderTable()"></td>
                    <td><button class="btn btn-info btn-xs" onclick="openSKU(${i})"><i class="fa fa-list"></i> SKU</button></td>
                    <td style="text-align:center;"><button class="btn btn-danger btn-xs" onclick="deleteRow(${i})"><i class="fa fa-trash"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function addRow() {
            brandRows.push({ TXT_SUBBRAND: MOCK_SUBBRAND[0], BIT_ALL_SKU: false, DEC_AMOUNT: 0, XXSHP_KDS_T_KLAIM_SKU: [] });
            renderTable();
        }

        function deleteRow(i) {
            bootbox.confirm('Delete this subbrand row?', res => { if (res) { brandRows.splice(i, 1); renderTable(); } });
        }

        function saveToStorage() {
            const dtl = klaimEnsureDetail(claimData, detailIndex);
            dtl.XXSHP_KDS_T_KLAIM_UMB[umbIndex].XXSHP_KDS_T_KLAIM_BRAN = brandRows.map(r => ({
                TXT_SUBBRAND: r.TXT_SUBBRAND,
                BIT_ALL_SKU: r.BIT_ALL_SKU ? 'Y' : 'N',
                DEC_AMOUNT: r.DEC_AMOUNT,
                XXSHP_KDS_T_KLAIM_SKU: r.XXSHP_KDS_T_KLAIM_SKU || []
            }));
            klaimSetData(claimData);
        }

        function openSKU(brandIndex) {
            saveToStorage();
            const url = `${basePath}Views/Klaim/SKU.html?intIndex=${detailIndex}&intDetailIndex=${umbIndex}&intBrandIndex=${brandIndex}`;
            window.parent.openKlaimPopup(url, 'Detail SKU');
        }

        function handleOK() {
            saveToStorage();
            klaimNotifyParent();
            window.parent.$('#klaimPopupModal').modal('hide');
        }
    </script>
</body>
</html>

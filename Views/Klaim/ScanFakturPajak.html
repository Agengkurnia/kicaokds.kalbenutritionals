<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Scan Faktur Pajak | KICAO KDS</title>
    <meta content="width=device-width, initial-scale=1" name="viewport">
</head>
<body style="background:#ecf0f5; padding:10px;">
    <div id="app-content">
         <section class="content-header">
             <h1>Scan Faktur Pajak <small>Parse URL Faktur DJP</small></h1>
         </section>
         <section class="content">
             <div class="box box-primary">
                 <div class="box-body">
                     <div class="form-group">
                         <label>URL Faktur Pajak Elektronik <i class="fa fa-info-circle text-info" data-toggle="tooltip" data-html="true" title="Parses DJP URL to populate:<br><b>TXT_FKT_PJK_NO</b> (Faktur No)<br><b>DTM_FKT_PJK</b> (Faktur Date)<br><b>DEC_INVOICE_AMT</b> (DPP/Invoice Amount)"></i></label>
                         <input type="text" class="form-control" id="txtFakturPajakUrl" placeholder="https://pajak.go.id/... atau paste URL faktur">
                     </div>
                     <div class="text-right">
                         <button class="btn btn-success" id="btnScan"><i class="fa fa-qrcode"></i> Scan & Apply</button>
                         <button class="btn btn-default" id="btnClose">Close</button>
                     </div>
                 </div>
             </div>
             <div class="box box-info" id="boxResult" style="display:none;">
                 <div class="box-header"><h3 class="box-title">Hasil Scan</h3></div>
                 <div class="box-body" id="scanResult"></div>
             </div>
         </section>
     </div>

     <script src="../../Scripts/customs/prototype/klaim-prototype.js"></script>
     <script>
         let detailIndex, claimData;

         document.addEventListener('DOMContentLoaded', async () => {
             const basePath = klaimDetectBasePath();
             klaimLoadBlankAssets(basePath);
             await klaimLoadBlankScripts(basePath);

             detailIndex = parseInt(klaimGetQueryParam('intIndex') || '0', 10);
             claimData = klaimGetData() || klaimDefaultClaimData();

             document.getElementById('btnScan').onclick = handleScan;
             document.getElementById('btnClose').onclick = () => window.parent.$('#klaimPopupModal').modal('hide');
             $('[data-toggle="tooltip"]').tooltip({ container: 'body' });
         });

        function handleScan() {
            const url = document.getElementById('txtFakturPajakUrl').value.trim();
            if (!url) {
                bootbox.alert('Masukkan URL faktur pajak terlebih dahulu.');
                return;
            }

            // Simulasi parse URL faktur pajak (production: POST /Transaksi/Klaim/ScanFakturPajakDetail)
            const mockResult = {
                TXT_FKT_PJK_NO: '010.000-26.00000001',
                DTM_FKT_PJK: new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).replace(/ /g, '-'),
                DEC_INVOICE_AMT: 250000000,
                TXT_INVOICE_NO: 'INV-SCAN-' + Math.floor(Math.random() * 9000 + 1000)
            };

            const dtl = klaimEnsureDetail(claimData, detailIndex);
            dtl.TXT_FKT_PJK_NO = mockResult.TXT_FKT_PJK_NO;
            dtl.DTM_FKT_PJK = mockResult.DTM_FKT_PJK;
            if (!dtl.DEC_INVOICE_AMT) dtl.DEC_INVOICE_AMT = mockResult.DEC_INVOICE_AMT;
            if (!dtl.TXT_INVOICE_NO) dtl.TXT_INVOICE_NO = mockResult.TXT_INVOICE_NO;

            klaimSetData(claimData);
            klaimNotifyParent();

            document.getElementById('boxResult').style.display = 'block';
            document.getElementById('scanResult').innerHTML = `
                <p><strong>Faktur Pajak No:</strong> ${mockResult.TXT_FKT_PJK_NO}</p>
                <p><strong>Faktur Pajak Date:</strong> ${mockResult.DTM_FKT_PJK}</p>
                <p><strong>Invoice No:</strong> ${mockResult.TXT_INVOICE_NO}</p>
                <p><strong>Invoice Amount:</strong> IDR ${klaimFormatCurrency(mockResult.DEC_INVOICE_AMT)}</p>
                <p class="text-muted"><em>Data telah diterapkan ke baris detail #${detailIndex + 1}</em></p>
            `;

            setTimeout(() => window.parent.$('#klaimPopupModal').modal('hide'), 1500);
        }
    </script>
</body>
</html>

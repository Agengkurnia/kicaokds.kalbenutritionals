<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Detail SKU | KICAO KDS</title>
    <meta content="width=device-width, initial-scale=1" name="viewport">
</head>
<body style="background:#ecf0f5; padding:10px;">
    <div id="app-content">
        <section class="content-header">
            <h1>Detail SKU <small>Alokasi Item</small></h1>
        </section>
        <section class="content">
            <div class="box box-primary">
                <div class="box-header with-border text-right">
                    <button id="btnOK" class="btn btn-success"><i class="fa fa-floppy-o"></i> OK</button>
                    <button id="btnCancel" class="btn btn-warning"><i class="fa fa-refresh"></i> Cancel</button>
                </div>
                <div class="box-body">
                    <div class="row-form">
                        <div class="col-md-2"><label class="control-label">Subbrand <i class="fa fa-info-circle text-info" data-toggle="tooltip" data-html="true" title="Table: <b>XXSHP_KDS_T_KLAIM_SKU</b><br>Field: N/A (referenced via FK from <b>XXSHP_KDS_T_KLAIM_BRAN</b>)"></i></label></div>
                        <div class="col-md-4"><input class="form-control" id="txtSubbrand" disabled></div>
                    </div>
                    <div class="row-form">
                        <div class="col-md-2"><label class="control-label">Total Amount <i class="fa fa-info-circle text-info" data-toggle="tooltip" data-html="true" title="Table: <b>XXSHP_KDS_T_KLAIM_BRAN</b><br>Field: <b>DEC_AMOUNT</b>"></i></label></div>
                        <div class="col-md-4"><input class="form-control text-right" id="txtTotalAmount" disabled></div>
                    </div>
                </div>
            </div>

            <div class="panel with-nav-tabs panel-default">
                <div class="panel-heading">
                    <ul class="nav nav-tabs"><li class="active"><a href="#tabSKU" data-toggle="tab">List SKU</a></li></ul>
                </div>
                <div class="panel-body">
                    <table id="dtSKU" class="table table-condensed table-striped table-hover table-bordered">
                        <thead>
                            <tr style="background:#36752d;color:white;">
                                <th>No</th>
                                <th>Item Code <i class="fa fa-info-circle text-info" data-toggle="tooltip" data-html="true" title="Table: <b>XXSHP_KDS_T_KLAIM_SKU</b><br>Field: <b>TXT_ITEMCODE</b>"></i></th>
                                <th>Item Description <i class="fa fa-info-circle text-info" data-toggle="tooltip" data-html="true" title="Table: <b>XXSHP_KDS_T_KLAIM_SKU</b><br>Field: <b>TXT_ITEMDESC</b>"></i></th>
                                <th style="text-align:right;">Amount <i class="fa fa-info-circle text-info" data-toggle="tooltip" data-html="true" title="Table: <b>XXSHP_KDS_T_KLAIM_SKU</b><br>Field: <b>DEC_AMOUNT</b>"></i></th>
                                <th>Delete</th>
                            </tr>
                        </thead>
                        <tbody id="dtSKUBody"></tbody>
                    </table>
                    <div class="text-right" style="margin-top:10px;">
                        <button class="btn btn-warning" id="btnAddSKU">Add Row</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script src="../../Scripts/customs/prototype/klaim-prototype.js"></script>
    <script>
        let basePath, detailIndex, umbIndex, brandIndex, claimData, skuRows = [];

        const MOCK_SKU = [
            { code: 'MILNA-001', desc: 'MILNA UHT Coklat 180ml' },
            { code: 'MILNA-002', desc: 'MILNA UHT Vanilla 250ml' },
            { code: 'CHK-100G', desc: 'CHILKID GOLD Vanilla 400g' },
            { code: 'PRG-200ML', desc: 'Prenagen Mommy Vanilla 200ml' }
        ];

        document.addEventListener('DOMContentLoaded', async () => {
            basePath = klaimDetectBasePath();
            klaimLoadBlankAssets(basePath);
            await klaimLoadBlankScripts(basePath);

            detailIndex = parseInt(klaimGetQueryParam('intIndex') || '0', 10);
            umbIndex = parseInt(klaimGetQueryParam('intDetailIndex') || '0', 10);
            brandIndex = parseInt(klaimGetQueryParam('intBrandIndex') || '0', 10);
            claimData = klaimGetData() || klaimDefaultClaimData();
            const dtl = klaimEnsureDetail(claimData, detailIndex);
            const brand = (dtl.XXSHP_KDS_T_KLAIM_UMB[umbIndex] || {}).XXSHP_KDS_T_KLAIM_BRAN[brandIndex] || {};

            document.getElementById('txtSubbrand').value = brand.TXT_SUBBRAND || '';
            document.getElementById('txtTotalAmount').value = klaimFormatCurrency(brand.DEC_AMOUNT || 0);

            if (brand.XXSHP_KDS_T_KLAIM_SKU && brand.XXSHP_KDS_T_KLAIM_SKU.length) {
                skuRows = brand.XXSHP_KDS_T_KLAIM_SKU.map(s => ({
                    TXT_ITEMCODE: s.TXT_ITEMCODE || '',
                    TXT_ITEMDESC: s.TXT_ITEMDESC || '',
                    DEC_AMOUNT: s.DEC_AMOUNT || 0
                }));
            } else {
                skuRows = [{ TXT_ITEMCODE: MOCK_SKU[0].code, TXT_ITEMDESC: MOCK_SKU[0].desc, DEC_AMOUNT: brand.DEC_AMOUNT || 0 }];
            }

             renderTable();
             document.getElementById('btnAddSKU').onclick = addRow;
             document.getElementById('btnOK').onclick = handleOK;
             document.getElementById('btnCancel').onclick = () => window.parent.$('#klaimPopupModal').modal('hide');
             $('[data-toggle="tooltip"]').tooltip({ container: 'body' });
         });

        function renderTable() {
            const tbody = document.getElementById('dtSKUBody');
            tbody.innerHTML = '';
            skuRows.forEach((row, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="text-align:center;">${i + 1}</td>
                    <td>
                        <select class="form-control input-sm" onchange="selectSKU(${i}, this.value)">
                            ${MOCK_SKU.map(s => `<option value="${s.code}" ${row.TXT_ITEMCODE === s.code ? 'selected' : ''}>${s.code}</option>`).join('')}
                        </select>
                    </td>
                    <td><input class="form-control input-sm" value="${row.TXT_ITEMDESC}" onchange="skuRows[${i}].TXT_ITEMDESC=this.value"></td>
                    <td><input class="form-control input-sm text-right" value="${klaimFormatCurrency(row.DEC_AMOUNT)}" onchange="skuRows[${i}].DEC_AMOUNT=klaimCleanNumber(this.value); renderTable()"></td>
                    <td style="text-align:center;"><button class="btn btn-danger btn-xs" onclick="deleteRow(${i})"><i class="fa fa-trash"></i></button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function selectSKU(i, code) {
            const found = MOCK_SKU.find(s => s.code === code);
            skuRows[i].TXT_ITEMCODE = code;
            if (found) skuRows[i].TXT_ITEMDESC = found.desc;
            renderTable();
        }

        function addRow() {
            skuRows.push({ TXT_ITEMCODE: MOCK_SKU[0].code, TXT_ITEMDESC: MOCK_SKU[0].desc, DEC_AMOUNT: 0 });
            renderTable();
        }

        function deleteRow(i) {
            bootbox.confirm('Delete this SKU row?', res => { if (res) { skuRows.splice(i, 1); renderTable(); } });
        }

        function handleOK() {
            const dtl = klaimEnsureDetail(claimData, detailIndex);
            dtl.XXSHP_KDS_T_KLAIM_UMB[umbIndex].XXSHP_KDS_T_KLAIM_BRAN[brandIndex].XXSHP_KDS_T_KLAIM_SKU = skuRows.map(r => ({
                TXT_ITEMCODE: r.TXT_ITEMCODE,
                TXT_ITEMDESC: r.TXT_ITEMDESC,
                DEC_AMOUNT: r.DEC_AMOUNT
            }));
            klaimSetData(claimData);
            klaimNotifyParent();
            window.parent.$('#klaimPopupModal').modal('hide');
        }
    </script>
</body>
</html>
